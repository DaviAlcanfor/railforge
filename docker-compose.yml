services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - railforge_output:/output
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  railforge-rails:
    build:
      context: ./backend
      dockerfile: dockerfiles/Dockerfile.rails
    image: railforge-rails
    command: echo "image ready"

  railforge-nest:
    build:
      context: ./backend
      dockerfile: dockerfiles/Dockerfile.nest
    image: railforge-nest
    command: echo "image ready"

  railforge-laravel:
    build:
      context: ./backend
      dockerfile: dockerfiles/Dockerfile.laravel
    image: railforge-laravel
    command: echo "image ready"

volumes:
  railforge_output: